<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fund Wallet</title>

<link rel="stylesheet" href="css/wallet.css">

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const SUPABASE_URL = "https://gdjunodzuyqdwphlvfdx.supabase.co"

const SUPABASE_ANON_KEY = "sb_publishable_nVPSmZ3E-NDWBxkXv0Goyw_FNOw9WBu"

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
)

</script>

</head>

<body>

<div class="container">

<h2>Fund Wallet</h2>

<div class="balance-card">
<p>Current Balance</p>
<h1 id="walletBalance">₵0</h1>
</div>

<div class="section">

<h3>Select Payment Method</h3>

<div class="method selected">
<h4>Paystack</h4>
<p>MTN, Vodafone, AirtelTigo Mobile Money, Card</p>
</div>

</div>

<div class="section">

<label>Enter Amount</label>
<input type="number" id="amount" placeholder="Enter amount">

<button onclick="payWithPaystack()" class="fund-btn">
Fund Wallet
</button>

</div>

</div>

<script src="js/wallet.js"></script>

<script>

async function loadWallet(){

const { data: { user } } = await supabase.auth.getUser()

if(!user){

window.location.href="login.html"
return

}

let { data } = await supabase
.from("users")
.select("wallet_balance")
.eq("id", user.id)
.single()

if(data){

document.getElementById("walletBalance").innerText =
"₵ " + data.wallet_balance

}

}

loadWallet()

</script>

</body>
</html>
